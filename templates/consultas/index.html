
<!DOCTYPE html><html><head><title>Consultas</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"></head>
<body class="container mt-5">
<h2>Consultas</h2>
<a href="/consultas/agregar" class="btn btn-warning mb-3">Agregar</a>
<table class="table table-bordered">
<tr><th>ID</th><th>Fecha</th><th>Diagnóstico</th><th>Tratamiento</th><th>Médico</th><th>Paciente</th><th>Acción</th></tr>
{% for c in consultas %}
<tr>
<td>{{c.id_consulta}}</td>
<td>{{c.fecha}}</td>
<td>{{c.diagnostico}}</td>
<td>{{c.tratamiento}}</td>
<td>{{c.id_medico}}</td>
<td>{{c.id_paciente}}</td>
<td><a href="/consultas/eliminar/{{c.id_consulta}}" class="btn btn-danger btn-sm">Eliminar</a></td>
</tr>
{% endfor %}
</table></body></html>
