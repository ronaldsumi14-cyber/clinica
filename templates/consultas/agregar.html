
<!DOCTYPE html><html><head><title>Agregar Consulta</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"></head>
<body class="container mt-5">
<h2>Agregar Consulta</h2>
<form method="POST">
<input type="date" name="fecha" class="form-control mb-3" required>
<input type="text" name="diagnostico" class="form-control mb-3" placeholder="Diagnóstico" required>
<input type="text" name="tratamiento" class="form-control mb-3" placeholder="Tratamiento" required>

<select name="id_medico" class="form-control mb-3">
{% for m in medicos %}
<option value="{{m.id_medico}}">{{m.nombre}}</option>
{% endfor %}
</select>

<select name="id_paciente" class="form-control mb-3">
{% for p in pacientes %}
<option value="{{p.id_paciente}}">{{p.nombre}}</option>
{% endfor %}
</select>

<button class="btn btn-warning">Guardar</button>
</form></body></html>
