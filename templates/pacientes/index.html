
<!DOCTYPE html><html><head><title>Pacientes</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"></head>
<body class="container mt-5">
<h2>Pacientes</h2>
<a href="/pacientes/agregar" class="btn btn-success mb-3">Agregar</a>
<table class="table table-bordered">
<tr><th>ID</th><th>Nombre</th><th>Edad</th><th>Dirección</th><th>Teléfono</th><th>Acción</th></tr>
{% for p in pacientes %}
<tr>
<td>{{p.id_paciente}}</td>
<td>{{p.nombre}}</td>
<td>{{p.edad}}</td>
<td>{{p.direccion}}</td>
<td>{{p.telefono}}</td>
<td><a href="/pacientes/eliminar/{{p.id_paciente}}" class="btn btn-danger btn-sm">Eliminar</a></td>
</tr>
{% endfor %}
</table></body></html>
