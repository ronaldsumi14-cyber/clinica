
<!DOCTYPE html><html><head><title>Médicos</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"></head>
<body class="container mt-5">
<h2>Médicos</h2>
<a href="/medicos/agregar" class="btn btn-primary mb-3">Agregar</a>
<table class="table table-bordered">
<tr><th>ID</th><th>Nombre</th><th>Especialidad</th><th>Teléfono</th><th>Correo</th><th>Acción</th></tr>
{% for m in medicos %}
<tr>
<td>{{m.id_medico}}</td>
<td>{{m.nombre}}</td>
<td>{{m.especialidad}}</td>
<td>{{m.telefono}}</td>
<td>{{m.correo}}</td>
<td><a href="/medicos/eliminar/{{m.id_medico}}" class="btn btn-danger btn-sm">Eliminar</a></td>
</tr>
{% endfor %}
</table></body></html>
