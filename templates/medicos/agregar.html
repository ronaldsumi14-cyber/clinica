
<!DOCTYPE html><html><head><title>Agregar Médico</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"></head>
<body class="container mt-5">
<h2>Agregar Médico</h2>
<form method="POST">
<input type="text" name="nombre" class="form-control mb-3" placeholder="Nombre" required>
<input type="text" name="especialidad" class="form-control mb-3" placeholder="Especialidad" required>
<input type="text" name="telefono" class="form-control mb-3" placeholder="Teléfono">
<input type="email" name="correo" class="form-control mb-3" placeholder="Correo">
<button class="btn btn-primary">Guardar</button>
</form></body></html>
